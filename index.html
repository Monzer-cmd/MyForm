<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css"/>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form1</title>
</head>
<body>


<h1>
    Login
</h1>

<form>


<input 
type="text"
class="username"
placeholder="  Username"
autofocus
required
/>

<input 
type="password"
class="password"
placeholder="  Password"
required
/>  

<input 
type="email"
class="email"
placeholder="  Email"
required
/>  

<input 
type="number"
class="age"
placeholder="  Age"
required
min="18"
max="70"
/>  

<input
class="send"
type="submit"
value="Send"
/>


</form>

</body>
</html>
